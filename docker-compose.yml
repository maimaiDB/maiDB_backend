services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  migrate:
    build:
      context: .
      target: builder
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run migration:run
    profiles:
      - migrate
