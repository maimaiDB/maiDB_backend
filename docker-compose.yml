services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    env_file: .env
    network_mode: host
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      DB_HOST: localhost

  migrate:
    build:
      context: .
      target: builder
    env_file: .env
    network_mode: host
    environment:
      DB_HOST: localhost
    command: npm run migration:run
    profiles:
      - migrate
